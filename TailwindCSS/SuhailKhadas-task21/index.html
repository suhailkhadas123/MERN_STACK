<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>+ Project</title>
  
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  
<link rel="stylesheet" href="./styles.css">
  <style>
   
  </style>
</head>
<body class="bg-white overflow-x-hidden">

  <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
      
      <div class="flex items-center gap-1">
        <span class="text-gray-400 font-semibold text-lg">+</span>
        <span class="font-bold text-gray-900 text-lg tracking-tight">Project</span>
      </div>

      <div class="hidden md:flex items-center gap-7">
          <a href="#" class="nav-link text-sm font-medium text-gray-600">Product</a>
          <a href="#" class="nav-link text-sm font-medium text-gray-600">Solutions</a>
          <a href="#" class="nav-link text-sm font-medium text-gray-600">Resources</a>
          <a href="#" class="nav-link text-sm font-medium text-gray-600">Pricing</a>
          <a href="#" class="nav-link text-sm font-medium text-gray-600">Log in</a>
        </div>

    

      <button class="btn-primary text-white text-sm font-semibold px-5 py-2 rounded-lg shadow-md cursor-pointer">
        Get AI free
      </button>
    </div>
  </nav>

  <section class="hero-gradient min-h-screen relative overflow-hidden pt-16 pb-32">


    <div class="text-center px-6 relative z-10">
      <h1 class="text-5xl md:text-6xl font-extrabold text-gray-900 leading-tight mb-4">
                Write, plan, share.<br/>
                <span class="text-gray-800">With AI at your side.</span>
              </h1>
              
              <p class="text-gray-500 text-base md:text-lg max-w-xl mx-auto mb-8 leading-relaxed">
                It is the connected workspace where better, faster work happens. Now with AI.
              </p>

              <div class="relative inline-flex items-center gap-4 justify-center">
                <button class="btn-primary text-white font-semibold px-6 py-3 rounded-xl shadow-lg text-sm cursor-pointer">
                  Get AI free &rarr;
                </button>
                    <button class="btn-secondary text-white font-semibold px-6 py-3 rounded-xl shadow-lg text-sm cursor-pointer">
                      Request a demo
            </button>
          </div>
    </div>

    <div class="relative max-w-4xl mx-auto mt-16 px-6">

 
      <div class="relative z-10 mx-auto w-full max-w-md rounded-2xl overflow-hidden shadow-2xl border border-gray-200 bg-white">

        <img src="image.jpg" alt="Dashboard Preview" class="w-full h-auto object-cover block"/>
      </div>

      <div class="floating-card card-glass absolute left-0 md:-left-12 top-8 z-20 rounded-2xl shadow-xl border border-gray-100 px-4 py-3 w-52 hidden sm:block">
            <div class="flex items-center gap-2 mb-1">
              <div class="w-7 h-7 rounded-full bg-purple-100 flex items-center justify-center">
                <i class="fa-regular fa-user text-purple-500 text-xs"></i>
              </div>
              <span class="font-semibold text-gray-800 text-sm">Tasks</span>
 </div>
        <p class="text-gray-500 text-xs pl-9 leading-snug">12 tasks completed today</p>
      </div>

      <div class="floating-card card-glass absolute right-0 md:-right-8 top-6 z-20 rounded-2xl shadow-xl border border-gray-100 px-4 py-3 w-48 hidden sm:block">
        <div class="flex items-center gap-2 mb-1">
          <div class="w-6 h-6 rounded-full bg-green-100 flex items-center justify-center">
            <i class="fa-solid fa-check text-green-500 text-xs"></i>
          </div>
          <span class="font-semibold text-gray-800 text-sm">Project Status</span>
        </div>
        <span class="ml-8 text-xs font-semibold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">On Track</span>
      </div>

      <div class="floating-card card-glass absolute right-4 md:-right-4 bottom-0 md:-bottom-6 z-20 rounded-2xl shadow-xl border border-gray-100 px-4 py-3 w-48 hidden sm:block">
        <p class="font-semibold text-gray-800 text-sm mb-2">Team Activity</p>
        <div class="flex items-center gap-2">
          <!-- Stacked Avatars -->
          <div class="flex -space-x-2">
            <div class="w-7 h-7 rounded-full bg-blue-400 border-2 border-white flex items-center justify-center text-white text-xs font-bold shadow-sm">A</div>
            <div class="w-7 h-7 rounded-full bg-pink-400 border-2 border-white flex items-center justify-center text-white text-xs font-bold shadow-sm">B</div>
            <div class="w-7 h-7 rounded-full bg-yellow-400 border-2 border-white flex items-center justify-center text-white text-xs font-bold shadow-sm">C</div>
          </div>
          <span class="text-xs text-gray-500 font-medium">+5 online</span>
        </div>
      </div>

    </div>
  </section>

  <button class="chat-btn fixed bottom-6 right-6 z-50 w-14 h-14 bg-gray-900 rounded-full shadow-xl flex items-center justify-center text-white text-xl cursor-pointer">
    <i class="fa-regular fa-comment-dots"></i>
  </button>

</body>
</html>
